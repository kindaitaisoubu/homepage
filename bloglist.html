<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ブログ一覧</title>
    <link rel="stylesheet" href="bloglist.css">

    <style>
        body {
            font-family: sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .blog-item {
            padding: 20px;
            border: 1px solid #ccc;
            margin-bottom: 25px;
            border-radius: 8px;
            background: #fafafa;
        }

        .blog-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .blog-date {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
        }

        .blog-content {
            white-space: pre-wrap;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .file-link {
            display: inline-block;
            margin-top: 10px;
            color: #007bff;
        }
    </style>
</head>

<body>

    <h1>ブログ一覧</h1>

    <div id="allBlogs">読み込み中...</div>

    <script>const GAS_URL = "https://script.google.com/macros/s/AKfycbyl-i8x8GClQfh4g_TUK9eATrle5SJb1O0NfTxMZM1EH9TCfAvgYN_Tpous1nDsRHpXSQ/exec";

    async function loadAllBlogs() {
        const res = await fetch(GAS_URL + "?action=getAllBlogs");
        const data = await res.json();

        const container = document.getElementById("allBlogs");
        container.innerHTML = "";

        if (!data.ok) {
            container.textContent = "ブログを読み込めませんでした。";
            return;
        }

        data.blogs.forEach(blog => {
            const div = document.createElement("div");
            div.className = "blog-item";

            div.innerHTML = `
                <div class="blog-title">${blog.title}</div>
                <div class="blog-date">投稿日：${blog.date}</div>
                <div class="blog-content">${blog.content}</div>
                ${blog.file ? `<a class="file-link" href="${blog.file}" target="_blank">添付ファイルを見る</a>` : ""}
            `;

            container.appendChild(div);
        });
    }

    loadAllBlogs();</script>

</body>
</html>
